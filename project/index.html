<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Образовательная платформа</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="text-block">
                    <h1>Учись онлайн<br>у лучших экспертов</h1>
                    <p class="subtitle">интерактивные курсы и вебинары для вашего успеха</p>
                    <button class="btn-start">начать обучение</button>
                </div>
                <div class="banner-right">
                    <p class="banner-title">LEARN. GROW. SUCCEED.</p>
                    <p class="banner-subtitle">Your future, powered by knowledge</p>
                    <div class="illustration"></div>
                </div>
            </div>

            <div class="search-bar">
                <div class="input-group">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Найти курс">
                </div>
                <select><option>Уровень</option></select>
                <select><option>Категории</option></select>
                <select><option>Длительность</option></select>
                <button class="btn-find">Найти</button>
            </div>
        </div>
    </header>
</body>
</html>
